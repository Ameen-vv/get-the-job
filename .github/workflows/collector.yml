name: Job Collector

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  collect:
    name: Collect Jobs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: collector/jobspy/requirements.txt

      - name: Install dependencies
        run: pip install -r collector/jobspy/requirements.txt

      - name: Run collector
        env:
          APP_URL: ${{ secrets.APP_URL }}
          COLLECTOR_API_KEY: ${{ secrets.COLLECTOR_API_KEY }}
        working-directory: collector/jobspy
        run: python main.py
