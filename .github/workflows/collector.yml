name: Job Collector

on:
  schedule:
    - cron: "0 9 * * *"
      timezone: "Asia/Kolkata"
    - cron: "0 15 * * *"
      timezone: "Asia/Kolkata"
  workflow_dispatch:
    inputs:
      hours_old:
        description: "Fetch jobs posted within this many hours"
        default: "12"
        required: false

jobs:
  collect:
    name: Collect Jobs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: collector/jobspy/requirements.txt

      - name: Install dependencies
        run: pip install -r collector/jobspy/requirements.txt

      - name: Run collector
        env:
          APP_URL: ${{ secrets.APP_URL }}
          COLLECTOR_API_KEY: ${{ secrets.COLLECTOR_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HOURS_OLD_OVERRIDE: ${{ github.event.inputs.hours_old }}
        working-directory: collector/jobspy
        run: python main.py
